<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login - AgroTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background: url('img/bg.jpg') no-repeat center center;
  background-size: cover;
  position:relative;
}
body::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4); /* bisa ubah 0.3 - 0.6 */
  z-index:0;
}
/*Welcome*/
.welcome{
  position:absolute;
  top:40px;
  text-align:center;
  width:100%;
  color:white;
}

.welcome h1{
  margin:0;
  font-size:32px;
  font-weight:600;
}

.welcome p{
  margin-top:5px;
  font-size:14px;
  opacity:0.8;
}
.welcome{
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(-20px);}
  to{opacity:1; transform:translateY(0);}
}
/* GLASS BOX */
.box{
  position:relative;
  z-index:1;

  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.15);
  border-radius:20px;
  padding:40px;
  width:380px;
  text-align:center;
  color:white;

  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
.box{
  border:1px solid rgba(255,255,255,0.2);
}

/* LOGO */
.logo-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}

.logo-area img{
  width:60px;
  height:60px;
  border-radius:50%;
}

/* TITLE */
.title{
  font-size:30px;
  font-weight:600;
}

.subtitle{
  font-size:16px;
  opacity:0.8;
  margin-bottom:20px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:14px;

  background:rgba(255,255,255,0.8);
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0096c7;
}

button:hover{
  background:#e2e8f0;
}

/* FITUR */
.fitur{
  margin-top:20px;
  font-size:12px;
  text-align:left;
  opacity:0.9;
}

/* CLOCK */
#clock{
  margin-top:15px;
  font-size:12px;
  opacity:0.8;
}

/* FOOTER */
.footer{
  position:absolute;
  bottom:25px;
  width:100%;
  text-align:center;
  font-size:14px;
  color:white;
  opacity:0.9;
}

</style>
</head>

<body>
<div class="welcome">
  <h1>Selamat Datang</h1>
  <p>Silakan login untuk melanjutkan ke sistem AgroTrack</p>
</div>
<div class="box">

  <div class="logo-area">
    <img src="img/logo.jpg">
    <div class="title">AgroTrack</div>
  </div>

  <div class="subtitle">
    Sistem Monitoring Produksi Harian
  </div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()" id="btnLogin">Login</button>

  <div class="fitur">
    ✔ Monitoring produksi real-time<br>
    ✔ Analisis target vs realisasi<br>
    ✔ Grafik performa mingguan
  </div>

  <div id="clock"></div>

</div>

<div class="footer">
  © 2026 AgroTrack System Kelompok 1
</div>

<script>

// USER (SIMULASI)
const users = [
  {username:'manajer', password:'456', role:'admin'},
  {username:'operator', password:'123', role:'operator'}
];

// AUTO LOGIN
if(sessionStorage.getItem("user")){
  window.location.href = "dashboard.html";
}

// LOGIN
function login(){

  const btn = document.getElementById("btnLogin");
  btn.innerText = "Loading...";

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();

  if(!username || !password){
    alert("Isi semua field!");
    btn.innerText = "Login";
    return;
  }

  const user = users.find(u =>
    u.username === username && u.password === password
  );

  if(user){
    sessionStorage.setItem("user", JSON.stringify(user));
    window.location.href = "dashboard.html";
  } else {
    alert("Login gagal!");
    btn.innerText = "Login";
  }
}

// JAM REALTIME
setInterval(()=>{
  document.getElementById('clock').innerText =
    new Date().toLocaleString('id-ID');
},1000);

</script>

</body>
</html>
